name: Daily draft generator (HITL)

# Generates daily marketing drafts and commits them to queue/pending/.
# A human reviews on GitHub (or in Obsidian after `git pull`), then either
# `git mv queue/pending/foo.md queue/approved/foo.md && git push`
#   → triggers publish.yml to actually post
# OR `git mv queue/pending/foo.md queue/rejected/foo.md && git push`
#   → permanently skipped.

on:
  schedule:
    - cron: "0 14 * * *"  # 14:00 UTC = 10:00 EDT — morning engagement window
  workflow_dispatch:
    inputs:
      mode:
        description: "Generation mode (template / llm / hybrid)"
        required: false
        default: "hybrid"
      use_config:
        description: "Use marketing-agent.yml (multi-project) instead of single repo?"
        required: false
        default: "true"
      single_repo:
        description: "Single repo to target (only used if use_config=false)"
        required: false
        default: "alex-jb/orallexa-ai-trading-agent"
      platforms:
        description: "Override platforms (only used in single-repo mode)"
        required: false
        default: "x"

permissions:
  contents: write
  issues: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate drafts → queue/pending/
        id: gen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MARKETING_AGENT_QUEUE: ${{ github.workspace }}/queue
          MARKETING_AGENT_DB_PATH: ${{ github.workspace }}/.marketing_agent.db
        run: |
          MODE="${{ github.event.inputs.mode || 'hybrid' }}"
          USE_CONFIG="${{ github.event.inputs.use_config || 'true' }}"
          if [ "$USE_CONFIG" = "true" ] && [ -f marketing-agent.yml ]; then
            echo "🗂  Multi-project mode (reading marketing-agent.yml)"
            PYTHONPATH=. python3 scripts/daily_post.py \
              --config marketing-agent.yml --mode "$MODE" --to-queue \
              --trends-too
          else
            REPO="${{ github.event.inputs.single_repo || 'alex-jb/orallexa-ai-trading-agent' }}"
            PLATFORMS="${{ github.event.inputs.platforms || 'x' }}"
            echo "🗂  Single-repo mode: $REPO"
            PYTHONPATH=. python3 scripts/daily_post.py \
              --repo "$REPO" --mode "$MODE" --platforms $PLATFORMS --to-queue
          fi

      - name: Commit drafts to queue/pending/
        if: steps.gen.outputs.queued_count != '' && steps.gen.outputs.queued_count != '0'
        run: |
          git config user.name  "marketing-agent-bot"
          git config user.email "marketing-agent-bot@users.noreply.github.com"
          git add queue/pending/
          if git diff --cached --quiet; then
            echo "No new drafts to commit."
            exit 0
          fi
          git commit -m "chore(queue): daily drafts for review ($(date -u +%Y-%m-%d))"
          git push

      - name: Open review notification issue
        if: steps.gen.outputs.queued_count != '' && steps.gen.outputs.queued_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Self-heal: ensure the "queue" label exists (idempotent).
          gh label create queue \
            --description "Items waiting for human review in the approval queue" \
            --color fbca04 2>/dev/null || true

          DATE=$(date -u +%Y-%m-%d)
          BODY=$(cat <<EOF
          📥 ${{ steps.gen.outputs.queued_count }} draft(s) waiting for review.

          To approve and publish:

          \`\`\`bash
          git pull
          git mv queue/pending/<file>.md queue/approved/<file>.md
          git commit -m "approve: <file>" && git push
          \`\`\`

          To reject permanently:

          \`\`\`bash
          git mv queue/pending/<file>.md queue/rejected/<file>.md
          git commit -m "reject: <file>" && git push
          \`\`\`

          See [queue/pending/](../tree/main/queue/pending) for drafts.
          EOF
          )
          gh issue create --title "📥 Daily drafts ready for review — $DATE" --body "$BODY" --label "queue"
